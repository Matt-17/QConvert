name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release artifacts
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve version from tag
        id: resolve_version
        shell: pwsh
        run: |
          if (-not "${{ github.ref_name }}".StartsWith("v")) {
            Write-Error "Tag must start with 'v'."
            exit 1
          }
          $version = "${{ github.ref_name }}".Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Tag must be in the form vX.Y.Z. Found '${version}'."
            exit 1
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore QConvert.slnx

      - name: Build
        run: >
          dotnet build QConvert.slnx
          --configuration Release
          --no-restore
          --disable-build-servers
          /m:1
          /p:BuildInParallel=false
          -p:UseSharedCompilation=false

      - name: Test
        run: dotnet test QConvert.slnx --configuration Release --no-build --disable-build-servers

      - name: Build and publish win-x64 app
        run: >
          dotnet publish QConvert/QConvert.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishProfile=win-x64
          -p:Version=${{ steps.resolve_version.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=false
          -p:UseSharedCompilation=false
          --disable-build-servers
          --output artifacts/publish/QConvert/Release/win-x64

      - name: Build MSI
        run: dotnet build QConvert.Installer/QConvert.Installer.wixproj --configuration Release -p:ProductVersion=${{ steps.resolve_version.outputs.version }} -p:UseSharedCompilation=false

      - name: Collect MSI path
        id: collect_msi
        shell: pwsh
        run: |
          $msi = "QConvert.Installer/bin/x64/Release/QConvert-${{ steps.resolve_version.outputs.version }}-x64.msi"
          if (-not (Test-Path $msi)) {
            throw "Missing MSI at $msi"
          }
          echo "path=$msi" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ steps.collect_msi.outputs.path }}

      - name: Check Winget package registration
        id: winget_package
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' }}
        shell: pwsh
        run: |
          $packageId = "Code-iX.QConvert"
          $packagePath = "manifests/$($packageId.ToLowerInvariant()[0])/$($packageId.Replace('.', '/'))"
          $url = "https://github.com/microsoft/winget-pkgs/tree/master/$packagePath"
          try {
            Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing -ErrorAction Stop | Out-Null
            echo "exists=true" >> $env:GITHUB_OUTPUT
          }
          catch {
            Write-Warning "$packageId is not in winget-pkgs yet. Submit the first version manually with wingetcreate; automated updates will run after it is merged."
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Set up .NET 6 for WingetCreate
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' && steps.winget_package.outputs.exists == 'true' }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 6.0.x

      - name: Download WingetCreate
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' && steps.winget_package.outputs.exists == 'true' }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "wingetcreate.exe"

      - name: Submit Winget package update
        if: ${{ env.WINGET_CREATE_GITHUB_TOKEN != '' && steps.winget_package.outputs.exists == 'true' }}
        shell: pwsh
        run: |
          $version = "${{ steps.resolve_version.outputs.version }}"
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/QConvert-$version-x64.msi|x64|machine"
          .\wingetcreate.exe update Code-iX.QConvert --urls $installerUrl --version $version --submit --no-open --prtitle "Update Code-iX.QConvert to $version"