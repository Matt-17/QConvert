name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run tests
        run: dotnet test QConvert.Tests/QConvert.Tests.csproj -c Release

      - name: Validate installer source
        run: |
          dotnet tool install --global wix --version "6.*"
          dotnet publish QConvert/QConvert.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish
          wix build installer/Package.wxs -arch x64 -d Version=0.0.1 -d PublishDir=publish -o QConvert-ci.msi
